services:
  - type: web
    name: getthatjob
    runtime: node
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: LLM_PROVIDER
        value: zhipu
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_MODEL
        value: glm-4.7
      - key: ZHIPU_ENDPOINT
        value: https://open.bigmodel.cn/api/paas/v4/chat/completions

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GetThatJob!</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --green: #087443;
      --amber: #a16207;
      --red: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--ink);
      margin: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      padding: 22px clamp(16px, 4vw, 48px);
    }
    main {
      display: grid;
      gap: 18px;
      margin: 0 auto;
      max-width: 1240px;
      padding: 20px clamp(16px, 4vw, 48px) 44px;
    }
    h1 {
      font-size: clamp(30px, 5vw, 56px);
      letter-spacing: 0;
      line-height: 1;
      margin: 8px 0 0;
    }
    h2, h3 { letter-spacing: 0; margin: 0; }
    p { color: var(--muted); margin: 8px 0 0; }
    label {
      color: var(--muted);
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
    }
    input, textarea {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      padding: 11px 12px;
      width: 100%;
    }
    textarea { min-height: 132px; resize: vertical; }
    button {
      background: var(--ink);
      border: 1px solid var(--ink);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      min-height: 42px;
      padding: 10px 14px;
    }
    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
    }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .tag {
      background: var(--accent-soft);
      border-radius: 999px;
      color: var(--accent);
      display: inline-flex;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 10px;
    }
    .workspace {
      align-items: start;
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .panel + .panel { margin-top: 14px; }
    .panel-header {
      align-items: flex-start;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    .step {
      align-items: center;
      background: var(--ink);
      border-radius: 999px;
      color: #fff;
      display: inline-flex;
      font-size: 12px;
      font-weight: 900;
      height: 26px;
      justify-content: center;
      min-width: 26px;
      padding: 0 9px;
    }
    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .hint {
      background: var(--surface-2);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
      padding: 10px 12px;
    }
    .hint.warning { background: #fff7ed; color: #9a3412; }
    .hint.error { background: #fef2f2; color: var(--red); font-weight: 700; }
    .hint.success { background: #ecfdf5; color: var(--green); font-weight: 700; }
    .muted { color: var(--muted); }
    .result-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 14px;
    }
    .metric {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 96px;
      padding: 14px;
    }
    .metric span {
      color: var(--muted);
      display: block;
      font-size: 13px;
      font-weight: 700;
    }
    .metric strong {
      display: block;
      font-size: 32px;
      letter-spacing: 0;
      margin-top: 6px;
    }
    .score.strong { color: var(--green); }
    .score.medium { color: var(--amber); }
    .score.low { color: var(--red); }
    .detail-section {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 18px;
    }
    .change-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .change-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .change-item h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .change-item dl {
      display: grid;
      gap: 8px;
      margin: 0;
    }
    .change-item dt {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .change-item dd {
      margin: 2px 0 0;
    }
    ul { margin: 10px 0 0; padding-left: 20px; }
    li { margin: 7px 0; }
    a.button-link {
      align-items: center;
      background: var(--accent);
      border-radius: 8px;
      color: #fff;
      display: inline-flex;
      font-weight: 800;
      min-height: 42px;
      padding: 10px 14px;
      text-decoration: none;
    }
    a.button-link.secondary {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
    }
    .empty {
      align-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      display: grid;
      min-height: 300px;
      padding: 28px;
      place-items: center;
      text-align: center;
    }
    .question {
      border-bottom: 1px solid var(--line);
      padding: 12px 0;
    }
    .question:last-child { border-bottom: 0; }
    .loading-shell {
      display: grid;
      gap: 16px;
    }
    .loading-top {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    .timer-pill {
      background: var(--ink);
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      padding: 7px 11px;
      white-space: nowrap;
    }
    .skeleton {
      animation: pulse 1.2s ease-in-out infinite;
      background: linear-gradient(90deg, #edf1f6 0%, #f8fafc 50%, #edf1f6 100%);
      background-size: 220% 100%;
      border-radius: 8px;
      min-height: 16px;
    }
    .skeleton.metric { min-height: 96px; }
    .skeleton-line { height: 14px; margin-top: 10px; }
    .skeleton-line.short { width: 56%; }
    .progress-list {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .progress-item {
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 4px;
      grid-template-columns: 22px 1fr;
      padding: 12px;
    }
    .progress-item:last-child { border-bottom: 0; }
    .progress-dot {
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      display: inline-flex;
      font-size: 12px;
      font-weight: 900;
      height: 20px;
      justify-content: center;
      margin-top: 1px;
      width: 20px;
    }
    .progress-item.done .progress-dot {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .progress-item.active .progress-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .progress-item.pending { color: var(--muted); }
    .progress-item strong { font-size: 14px; }
    .progress-item p { font-size: 13px; margin: 2px 0 0; }

    @keyframes pulse {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .row { grid-template-columns: 1fr; }
      .actions button, .actions a { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <span class="tag">Marshallzzz Career Tool</span>
    <h1>GetThatJob!</h1>
  </header>

  <main>
    <section class="workspace">
      <div>
        <div class="panel">
          <div class="panel-header">
            <h2><span class="step">1</span> Resume</h2>
          </div>

          <label for="resumeFile">Resume file</label>
          <input id="resumeFile" type="file" accept=".pdf,.txt,.md,.csv,.json" />
          <div id="resumeFileStatus" class="hint">PDF preferred. Text-like files are also supported.</div>

          <label for="resumeText">Extra context</label>
          <textarea id="resumeText" placeholder="Optional: paste portfolio notes, project details, or facts not obvious in the PDF."></textarea>

          <div class="row">
            <div>
              <label for="websiteUrl">Website</label>
              <input id="websiteUrl" placeholder="https://marshallzzz.com" />
            </div>
            <div>
              <label for="githubUrl">GitHub</label>
              <input id="githubUrl" placeholder="https://github.com/..." />
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2><span class="step">2</span> Target JD</h2>
          </div>
          <div id="llmStatus" class="hint warning">Checking model status...</div>

          <label for="jobUrl">JD URL</label>
          <input id="jobUrl" placeholder="https://..." />

          <div class="row">
            <div>
              <label for="jobTitle">Title</label>
              <input id="jobTitle" placeholder="AI Product Manager" />
            </div>
            <div>
              <label for="company">Company</label>
              <input id="company" placeholder="Company" />
            </div>
          </div>

          <label for="location">Location</label>
          <input id="location" placeholder="Remote / Shanghai / Beijing / ..." />

          <label for="jobDescription">JD text</label>
          <textarea id="jobDescription" placeholder="Paste responsibilities, requirements, qualifications, and role context."></textarea>

          <div class="actions">
            <button id="analyzeButton" onclick="analyzeTarget()">Analyze this JD</button>
            <button class="secondary" onclick="loadSampleData()">Load sample</button>
            <button class="secondary" onclick="clearAll()">Clear</button>
          </div>
          <div id="status" class="hint">Ready.</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div>
            <h2><span class="step">3</span> Resume Edit Review</h2>
            <p id="resultSubtitle">Submit one JD to generate a reviewable resume rewrite.</p>
          </div>
        </div>
        <div id="resultPanel" class="empty">No analysis yet.</div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      analysis: null,
      llmEnabled: false,
      llmProvider: null,
      resumeFileName: '',
      resumeFile: null,
      loadingTimer: null,
      loadingStartedAt: 0
    };

    const loadingSteps = [
      {
        at: 0,
        title: 'Reading resume',
        detail: 'Extracting resume text and treating submitted facts as the source of truth.'
      },
      {
        at: 4,
        title: 'Reading target JD',
        detail: 'Parsing the role requirements, responsibilities, and screening keywords.'
      },
      {
        at: 9,
        title: 'Matching evidence',
        detail: 'Checking which resume facts can support this JD without adding unsupported claims.'
      },
      {
        at: 16,
        title: 'Drafting change log',
        detail: 'Preparing what changed, why it changed, and which evidence supports each edit.'
      },
      {
        at: 26,
        title: 'Writing PDF draft',
        detail: 'Reordering and re-narrating existing resume content into a targeted PDF.'
      },
      {
        at: 38,
        title: 'Final integrity check',
        detail: 'Keeping gaps separate from resume claims and preparing interview prompts.'
      }
    ];

    document.getElementById('resumeFile').addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      state.resumeFileName = file.name;
      state.resumeFile = {
        name: file.name,
        type: file.type || inferFileType(file.name),
        dataBase64: await readFileAsBase64(file)
      };
      document.getElementById('resumeFileStatus').textContent = `Selected: ${file.name}`;

      if (file.name.match(/\.pdf$/i) || file.type === 'application/pdf') {
        setStatus(`Loaded ${file.name}.`);
        return;
      }

      try {
        document.getElementById('resumeText').value = await file.text();
      } catch (_error) {}
    });

    async function analyzeTarget() {
      const profile = {
        resumeFileName: state.resumeFileName,
        resumeFile: state.resumeFile,
        resumeText: readInput('resumeText'),
        websiteUrl: readInput('websiteUrl'),
        githubUrl: readInput('githubUrl')
      };
      const job = readJob();
      const validation = validateJob(job);

      if (!profile.resumeFileName) {
        setStatus('Please upload a resume file first.', 'error');
        return;
      }
      if (!validation.ok) {
        setStatus(validation.message, 'error');
        return;
      }

      setBusy(true);
      startAnalysisFeedback(job);
      try {
        const result = await requestJson('/api/analyze-target-jd', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile, job })
        });
        stopAnalysisFeedback();
        state.analysis = result.analysis;
        renderResult(result.analysis, result.summary);
        setStatus('Done. Review the changes before using the PDF.', 'success');
      } catch (error) {
        stopAnalysisFeedback();
        renderErrorState(error.message);
        setStatus(`Analysis failed: ${error.message}`, 'error');
      } finally {
        setBusy(false);
      }
    }

    function startAnalysisFeedback(job) {
      stopAnalysisFeedback();
      state.loadingStartedAt = Date.now();
      document.getElementById('resultSubtitle').textContent = job.title
        ? `Working on ${job.title}${job.company ? ` at ${job.company}` : ''}.`
        : 'Working on the target JD.';
      renderLoading();
      updateLoadingProgress();
      state.loadingTimer = window.setInterval(updateLoadingProgress, 1000);
    }

    function stopAnalysisFeedback() {
      if (state.loadingTimer) {
        window.clearInterval(state.loadingTimer);
        state.loadingTimer = null;
      }
      state.loadingStartedAt = 0;
    }

    function renderLoading() {
      const panel = document.getElementById('resultPanel');
      panel.className = '';
      panel.innerHTML = `
        <div class="loading-shell">
          <div class="loading-top">
            <div>
              <h2>Analyzing resume fit</h2>
              <p id="loadingHeadline">Preparing analysis...</p>
            </div>
            <span id="elapsedTimer" class="timer-pill">00:00</span>
          </div>

          <div class="result-grid">
            <div class="skeleton metric"></div>
            <div class="skeleton metric"></div>
            <div class="skeleton metric"></div>
          </div>

          <div class="detail-section">
            <h2>What changed and why</h2>
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
          </div>

          <div class="detail-section">
            <h2>Processing steps</h2>
            <div id="progressList" class="progress-list"></div>
          </div>
        </div>
      `;
    }

    function updateLoadingProgress() {
      if (!state.loadingStartedAt) return;
      const elapsedSeconds = Math.max(0, Math.floor((Date.now() - state.loadingStartedAt) / 1000));
      const activeIndex = loadingSteps.reduce((latest, step, index) => elapsedSeconds >= step.at ? index : latest, 0);
      const activeStep = loadingSteps[activeIndex];
      const timer = document.getElementById('elapsedTimer');
      const headline = document.getElementById('loadingHeadline');
      const list = document.getElementById('progressList');

      if (timer) timer.textContent = formatElapsed(elapsedSeconds);
      if (headline) headline.textContent = activeStep.detail;
      setStatus(`${activeStep.title}... ${formatElapsed(elapsedSeconds)} elapsed.`);

      if (list) {
        list.innerHTML = loadingSteps.map((step, index) => {
          const stateClass = index < activeIndex ? 'done' : index === activeIndex ? 'active' : 'pending';
          const marker = index < activeIndex ? 'ok' : index === activeIndex ? '>' : '';
          return `
            <div class="progress-item ${stateClass}">
              <span class="progress-dot">${marker}</span>
              <div>
                <strong>${escapeHtml(step.title)}</strong>
                <p>${escapeHtml(step.detail)}</p>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function renderResult(analysis, summary = {}) {
      const panel = document.getElementById('resultPanel');
      if (!analysis) {
        panel.className = 'empty';
        panel.textContent = 'No analysis yet.';
        return;
      }

      const levelClass = String(analysis.level || 'Low').toLowerCase();
      document.getElementById('resultSubtitle').textContent = summary.recommendation || `${analysis.title} at ${analysis.company}`;
      panel.className = '';
      panel.innerHTML = `
        <div class="result-grid">
          <div class="metric">
            <span>Interview chance</span>
            <strong class="score ${levelClass}">${analysis.successProbability || 0}%</strong>
          </div>
          <div class="metric">
            <span>Fit level</span>
            <strong class="score ${levelClass}">${escapeHtml(analysis.level || 'Low')}</strong>
          </div>
          <div class="metric">
            <span>Target role</span>
            <strong style="font-size:20px;">${escapeHtml(analysis.title || 'Target JD')}</strong>
          </div>
        </div>

        <div class="detail-section">
          <h2>What changed and why</h2>
          ${renderChangeLog(analysis.changeLog)}
        </div>

        <div class="detail-section">
          <h2>Rewritten resume PDF</h2>
          ${analysis.rewrittenResumePdfUrl
            ? `<div class="actions">
                <a class="button-link" href="${escapeHtml(buildDownloadUrl(analysis.rewrittenResumePdfUrl))}" download="${escapeHtml(buildResumeDownloadName(analysis))}">Download revised resume</a>
                <a class="button-link secondary" href="${escapeHtml(analysis.rewrittenResumePdfUrl)}" target="_blank" rel="noopener">Preview PDF</a>
              </div>`
            : `<p class="muted">${escapeHtml((analysis.contentIntegrityNotes || [])[0] || 'API-backed PDF generation is not configured.')}</p>`}
          ${renderListSection('Rewrite plan', analysis.resumeRewritePlan)}
        </div>

        <div class="detail-section">
          <h2>Fit evidence</h2>
          ${renderList(analysis.rankingReasons)}
          ${renderListSection('Resume edits to apply', analysis.resumeImprovements)}
        </div>

        <div class="detail-section">
          <h2>Gaps</h2>
          ${renderList(analysis.gaps || analysis.missingSkills)}
        </div>

        <div class="detail-section">
          <h2>Interview prep</h2>
          ${(analysis.interviewQuestions || []).length ? renderInterviewQuestions(analysis.interviewQuestions) : renderList(analysis.interviewTalkingPoints)}
        </div>

        <div class="detail-section">
          <h2>No-fabrication check</h2>
          ${renderList(analysis.contentIntegrityNotes)}
        </div>
      `;
    }

    function renderErrorState(message) {
      const panel = document.getElementById('resultPanel');
      document.getElementById('resultSubtitle').textContent = 'Analysis did not complete.';
      panel.className = 'empty';
      panel.innerHTML = `
        <div>
          <strong>Analysis failed</strong>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function renderChangeLog(items = []) {
      if (!items.length) {
        return '<p class="muted">No change log returned. Check model configuration or rerun with more JD text.</p>';
      }
      return `<div class="change-list">${items.map((item) => `
        <article class="change-item">
          <h3>${escapeHtml(item.section)}</h3>
          <dl>
            <div><dt>Before</dt><dd>${escapeHtml(item.before)}</dd></div>
            <div><dt>After</dt><dd>${escapeHtml(item.after)}</dd></div>
            <div><dt>Why</dt><dd>${escapeHtml(item.reason)}</dd></div>
            <div><dt>Evidence</dt><dd>${escapeHtml(item.sourceEvidence)}</dd></div>
          </dl>
        </article>
      `).join('')}</div>`;
    }

    function renderListSection(title, items = []) {
      if (!items || items.length === 0) return '';
      return `<div style="margin-top:14px;"><h3>${escapeHtml(title)}</h3>${renderList(items)}</div>`;
    }

    function renderList(items = []) {
      if (!items || items.length === 0) return '<p class="muted">No items returned.</p>';
      return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderInterviewQuestions(items = []) {
      return items.map((item) => `
        <div class="question">
          <strong>${escapeHtml(item.question)}</strong>
          <p>${escapeHtml(item.answer)}</p>
          <span class="tag">${escapeHtml(item.focusArea)}</span>
        </div>
      `).join('');
    }

    function buildDownloadUrl(url) {
      return `${url}${url.includes('?') ? '&' : '?'}download=1`;
    }

    function buildResumeDownloadName(analysis) {
      const raw = `revised-resume-${analysis.title || 'target-role'}.pdf`;
      return raw.replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '-').slice(0, 120);
    }

    function readJob() {
      return {
        title: readInput('jobTitle'),
        company: readInput('company'),
        location: readInput('location'),
        url: readInput('jobUrl'),
        description: readInput('jobDescription')
      };
    }

    function validateJob(job) {
      if (job.title && job.description) return { ok: true };
      if (job.url && state.llmEnabled) return { ok: true };
      if (job.url) {
        return { ok: false, message: 'URL-only analysis needs the model to fetch and read the JD. Paste the title and JD text, or check model config.' };
      }
      return { ok: false, message: 'Add a JD URL, or fill both title and JD text.' };
    }

    async function loadConfig() {
      try {
        const config = await requestJson('/api/config');
        state.llmEnabled = Boolean(config.llmEnabled);
        state.llmProvider = config.llmProvider;
        const status = state.llmEnabled
          ? `Model connected: ${config.llmProvider}${config.apiFeedbackModel ? ` / ${config.apiFeedbackModel}` : ''}.`
          : 'Model is not connected. Paste title and JD text manually.';
        const el = document.getElementById('llmStatus');
        el.textContent = status;
        el.className = state.llmEnabled ? 'hint success' : 'hint warning';
      } catch (_error) {
        document.getElementById('llmStatus').textContent = 'Could not read model status.';
      }
    }

    function loadSampleData() {
      document.getElementById('resumeText').value = 'AI product manager with engineering background. Built GetThatJob! using LLM, RAG, function calling, TypeScript, JavaScript, React, Node, API design, SQL, prompt engineering, and approval workflows. Strong English communication from global company experience.';
      state.resumeFileName = 'sample-resume.md';
      state.resumeFile = { name: 'sample-resume.md', type: 'text/plain', dataBase64: btoa('sample resume') };
      document.getElementById('resumeFileStatus').textContent = 'Selected: sample-resume.md';
      document.getElementById('websiteUrl').value = 'https://marshallzzz.com';
      document.getElementById('githubUrl').value = 'https://github.com/yzhan146/AIJobSearchCopilot';
      document.getElementById('jobTitle').value = 'AI Product Manager - LLM Platform';
      document.getElementById('company').value = 'Example AI Platform';
      document.getElementById('location').value = 'Remote';
      document.getElementById('jobDescription').value = 'Own roadmap for LLM platform, RAG tooling, agent workflow, prompt engineering, API integrations, user research, enterprise AI product strategy, and cross-functional launch execution. English communication preferred.';
      setStatus('Sample loaded.', 'success');
    }

    function clearAll() {
      for (const id of ['resumeText', 'websiteUrl', 'githubUrl', 'jobTitle', 'company', 'location', 'jobUrl', 'jobDescription']) {
        document.getElementById(id).value = '';
      }
      state.analysis = null;
      state.resumeFileName = '';
      state.resumeFile = null;
      document.getElementById('resumeFile').value = '';
      document.getElementById('resumeFileStatus').textContent = 'PDF preferred. Text-like files are also supported.';
      document.getElementById('resultSubtitle').textContent = 'Submit one JD to generate a reviewable resume rewrite.';
      renderResult(null);
      setStatus('Cleared.');
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) {
        const text = await response.text();
        let errorMessage = text;
        try {
          const parsed = JSON.parse(text);
          if (parsed.error) errorMessage = parsed.error;
        } catch (_parseError) {}
        throw new Error(errorMessage);
      }
      return response.json();
    }

    function readInput(id) {
      return document.getElementById(id).value.trim();
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          resolve(result.includes(',') ? result.split(',').pop() : result);
        };
        reader.onerror = () => reject(reader.error || new Error('Could not read file.'));
        reader.readAsDataURL(file);
      });
    }

    function inferFileType(fileName) {
      if (/\.pdf$/i.test(fileName)) return 'application/pdf';
      if (/\.(txt|md|csv|json)$/i.test(fileName)) return 'text/plain';
      return 'application/octet-stream';
    }

    function setStatus(message, type = 'info') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = type === 'error'
        ? 'hint error'
        : type === 'success'
          ? 'hint success'
          : type === 'warning'
            ? 'hint warning'
            : 'hint';
    }

    function setBusy(isBusy) {
      document.getElementById('analyzeButton').disabled = isBusy;
    }

    function formatElapsed(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadConfig();
  </script>
</body>
</html>
